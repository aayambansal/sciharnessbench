name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Verify the discrimination invariant
        run: |
          python scripts/run_benchmark.py --agent both --seeds 5 --quiet

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for leaked API keys
        run: |
          if grep -rEn 'sk-[A-Za-z0-9_-]{20,}' . ; then
            echo "::error::potential secret found"; exit 1
          fi
          echo "no secrets found"
